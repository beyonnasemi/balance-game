<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 밸런스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes flash { 0% { background: #d4f5e9; } 100% { background: #f8f8f8; } }
        .flash-effect { animation: flash 0.5s ease-out; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        .blink { animation: blink 1s infinite; }
        body { background: linear-gradient(180deg, #E0F2FE 0%, #FFFFFF 100%); }
    </style>
</head>
<body class="flex justify-center min-h-screen">
    <div class="w-full max-w-[480px] p-4" id="app">
        <!-- UI will be rendered here -->
    </div>

    <script>
    (function() {
        var SUPABASE_URL = "https://rwtijbgczknztsldhfvd.supabase.co";
        var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3dGlqYmdjemtuenRzbGRoZnZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MzcwMTYsImV4cCI6MjA5MTIxMzAxNn0.YHOBeH0W44CfApPIPN27aonvAr0_o6sM5nHBhII0uPU";
        var TABLE_NAME = "votes";
        var QUESTION_ID = "chicken-vs-pizza";

        var sb;
        var votes = { A: 0, B: 0 };
        var userChoice = null;
        var connectionStatus = "connecting"; // connecting, connected, saved, error

        window.generateQuestion = async function() {
            // 실제 API 키를 여기에 입력하거나, 안전한 방법으로 관리해야 합니다.
            // 여기서는 테스트를 위해 임시로 입력합니다.
            var API_KEY = "AIzaSyCpf2fKJtPVb6nZ0vZyM5y7vgt55wsZu_o"; 
            var prompt = "밸런스 게임 질문을 하나 만들어줘. 형식: 'A vs B, 당신의 선택은?' A와 B는 흥미로운 주제여야 해. 답변은 '질문 내용'만 반환해.";
            
            try {
                var response = await window.fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + API_KEY, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });
                var data = await response.json();
                
                // 안전한 데이터 접근
                if (data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts) {
                    var text = data.candidates[0].content.parts[0].text;
                    document.getElementById("question").innerText = text;
                } else {
                    console.error("API 응답 구조가 예상과 다릅니다:", data);
                    alert("질문 생성 중 오류가 발생했습니다.");
                }
            } catch (e) {
                console.error(e);
                alert("질문 생성 중 오류가 발생했습니다.");
            }
        };

        window.copyQuestion = function() {
            var questionText = document.getElementById("question").innerText;
            var shareText = questionText + "\n\n오늘의 밸런스 게임에 참여해보세요!\n" + window.location.href;
            
            navigator.clipboard.writeText(shareText).then(function() {
                alert("질문과 공유 링크가 복사되었습니다!");
            }).catch(function(err) {
                console.error("복사 실패:", err);
                alert("복사에 실패했습니다.");
            });
        };

        window.getStatusIcon = function() {
            if (connectionStatus === "connecting") return '<span class="w-2 h-2 rounded-full bg-orange-500"></span>';
            if (connectionStatus === "connected") return '<span class="w-2 h-2 rounded-full bg-green-500 blink"></span>';
            if (connectionStatus === "saved") return '<span class="text-green-600 font-bold">✓</span>';
            return '<span class="w-2 h-2 rounded-full bg-red-500"></span>';
        };

        var questions = [
            { id: "a-vs-b", title: "전공 수업 📚 vs 교양 수업 🎨", views: 120 },
            { id: "c-vs-d", title: "팀플 무임승차 😡 vs 시험 기간 벼락치기 ⚡", views: 110 },
            { id: "e-vs-f", title: "학식 🍱 vs 배달 음식 🛵", views: 105 },
            { id: "g-vs-h", title: "종강 🥳 vs 방학 🏖️", views: 100 },
            { id: "i-vs-j", title: "도서관 📖 vs 카페 ☕", views: 95 },
            { id: "k-vs-l", title: "과제 📝 vs 발표 🎤", views: 90 },
            { id: "m-vs-n", title: "아싸 👤 vs 인싸 👥", views: 85 },
            { id: "o-vs-p", title: "알바 💰 vs 공부 📚", views: 80 },
            { id: "q-vs-r", title: "연애 💖 vs 솔로 💔", views: 75 },
            { id: "s-vs-t", title: "기숙사 🛌 vs 자취 🏠", views: 70 }
        ];

        // 조회수 순 정렬
        questions.sort(function(a, b) { return b.views - a.views; });

        window.changeQuestion = function(id) {
            QUESTION_ID = id;
            userChoice = null;
            window.fetchVotes();
        };

        window.render = function() {
            var total = votes.A + votes.B;
            var percentA = total === 0 ? 50 : Math.round((votes.A / total) * 100);
            var percentB = 100 - percentA;

            var app = document.getElementById("app");
            var html = '<div class="flex flex-col gap-6">';
            
            // 헤더 영역
            html += '<div class="flex justify-between items-center bg-white/60 p-4 rounded-full shadow-sm">';
            html += '<div>' + window.getStatusIcon() + '</div>';
            html += '<span class="text-gray-800 font-bold">오늘의 밸런스</span>';
            html += '<button onclick="window.fetchVotes()" class="text-gray-500 hover:text-gray-700">↻</button>';
            html += '</div>';

            // 질문 카드
            html += '<div class="bg-white p-6 rounded-3xl shadow-lg border border-white/50">';
            html += '<h1 id="question" class="text-2xl font-bold text-center text-gray-900 mb-6">' + (questions.find(q => q.id === QUESTION_ID)?.title || "밸런스 게임") + '</h1>';
            
            html += '<div class="grid grid-cols-2 gap-4 mb-6">';
            html += '<button onclick="vote(\'A\')" class="bg-white border-2 border-gray-100 rounded-2xl p-4 flex flex-col items-center gap-2 transition-all ' + (userChoice === 'A' ? 'border-[#1D9E75] ring-2 ring-[#1D9E75]/20' : 'hover:border-gray-200') + '">';
            html += '<span class="text-4xl">🍗</span>';
            html += '<span class="font-bold text-lg text-gray-800">치킨</span>';
            html += (userChoice === 'A' ? '<span class="text-xs bg-[#1D9E75] text-white px-2 py-0.5 rounded-full">내 선택</span>' : '');
            html += '</button>';
            html += '<button onclick="vote(\'B\')" class="bg-white border-2 border-gray-100 rounded-2xl p-4 flex flex-col items-center gap-2 transition-all ' + (userChoice === 'B' ? 'border-[#378ADD] ring-2 ring-[#378ADD]/20' : 'hover:border-gray-200') + '">';
            html += '<span class="text-4xl">🍕</span>';
            html += '<span class="font-bold text-lg text-gray-800">피자</span>';
            html += (userChoice === 'B' ? '<span class="text-xs bg-[#378ADD] text-white px-2 py-0.5 rounded-full">내 선택</span>' : '');
            html += '</button>';
            html += '</div>';

            // 결과 그래프
            html += '<div class="space-y-2">';
            html += '<div class="flex justify-between text-sm text-gray-500 font-medium">';
            html += '<span>' + percentA + '%</span>';
            html += '<span>' + percentB + '%</span>';
            html += '</div>';
            html += '<div class="flex h-3 rounded-full overflow-hidden bg-gray-100">';
            html += '<div style="width: ' + percentA + '%" class="bg-[#1D9E75] transition-all duration-500"></div>';
            html += '<div style="width: ' + percentB + '%" class="bg-[#378ADD] transition-all duration-500"></div>';
            html += '</div>';
            html += '</div>';
            html += '</div>';

            // 하단 버튼
            html += '<div class="grid grid-cols-2 gap-4">';
            html += '<button onclick="generateQuestion()" class="bg-white text-gray-800 py-4 rounded-2xl font-bold shadow-md hover:bg-gray-50 transition">새로운 문제</button>';
            html += '<button onclick="copyQuestion()" class="bg-white text-gray-800 py-4 rounded-2xl font-bold shadow-md hover:bg-gray-50 transition">친구에게 공유</button>';
            html += '</div>';

            // 인기 질문 목록
            html += '<div class="bg-white/50 p-6 rounded-3xl shadow-sm">';
            html += '<h2 class="font-bold text-gray-800 mb-4">인기 질문</h2>';
            html += '<ul class="space-y-3">';
            questions.forEach(function(q) {
                html += '<li onclick="changeQuestion(\'' + q.id + '\')" class="cursor-pointer text-sm p-3 rounded-2xl bg-white hover:bg-gray-50 flex justify-between items-center ' + (q.id === QUESTION_ID ? 'ring-2 ring-blue-400' : '') + '">';
                html += '<span class="font-medium text-gray-700">' + q.title + '</span>';
                html += '<span class="text-xs text-gray-400">' + q.views + ' views</span>';
                html += '</li>';
            });
            html += '</ul>';
            html += '</div>';
            html += '</div>';
            
            app.innerHTML = html;
        };

        window.fetchVotes = async function() {
            connectionStatus = "connecting";
            window.render();
            try {
                var { data, error } = await sb
                    .from(TABLE_NAME)
                    .select("option")
                    .eq("question_id", QUESTION_ID);
                
                if (error) throw error;

                votes = { A: 0, B: 0 };
                data.forEach(function(row) {
                    votes[row.option]++;
                });
                connectionStatus = "connected";
            } catch (e) {
                console.error(e);
                connectionStatus = "error";
            }
            window.render();
        };

        window.vote = async function(choice) {
            if (userChoice) return;
            
            try {
                var { error } = await sb
                    .from(TABLE_NAME)
                    .insert({ question_id: QUESTION_ID, option: choice });
                
                if (error) throw error;
                
                userChoice = choice;
                connectionStatus = "saved";
                window.fetchVotes();
            } catch (e) {
                console.error(e);
                connectionStatus = "error";
                window.render();
            }
        };

        window.addEventListener('DOMContentLoaded', function() {
            sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            // Realtime subscription
            sb.channel("any")
                .on("postgres_changes", { event: "INSERT", schema: "public", table: TABLE_NAME }, function(payload) {
                    if (payload.new.question_id === QUESTION_ID) {
                        votes[payload.new.option]++;
                        window.render();
                    }
                })
                .subscribe(function(status) {
                    if (status === "SUBSCRIBED") {
                        connectionStatus = "connected";
                        window.render();
                    }
                });

            window.fetchVotes();
        });
    })();
    </script>
</body>
</html>
